<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepHire</title>
    <link rel="stylesheet" href="home.css" />
    <script src="home.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="deephire-bg-container">
      <div class="deephire-top-section">
        <div class="d-flex felx-row justify-content-center">
          <img
            class="deephire-logo"
            src="https://i.pinimg.com/736x/45/91/22/45912200226955270ea515fce9c4daae.jpg"
            alt=""
          />
          <h1 class="deephire-title text-center">DeepHire</h1>
        </div>
        <div class="deephire-caption shadow d-flex flex-row justify-content-center">
          <img
            class="deephire-bg-img"
            src="https://i.pinimg.com/736x/a6/2b/fb/a62bfb169ea67fb51a32da1917415721.jpg"
            alt=""
          />
          <h2 class="deephire-caption">
            Lorem, ipsum dolor. <br />
            Lorem ipsum dolor sit amet.
          </h2>
        </div>
      </div>
      <div class="deephire-mid-section">
        <div class="d-flex flex-row">
          <div class="container">
            <div class="row">
              <div class="col-6">
                <div class="deephire-card shadow">
                  <h2 class="deephire-card-heading">Companies</h2>
                  <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/59/7f/11/597f11b631d7d94492f1adb95110cc44.jpg"
                        alt=""
                      />
                      <p class="company-name">Google</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/21/01/b4/2101b483d2299babdf9c901636df67ba.jpg"
                        alt=""
                      />
                      <p class="company-name">Meta</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/60/6b/c0/606bc0717982547e555a514b479365a0.jpg"
                        alt=""
                      />
                      <p class="company-name">Apple</p>
                    </div>
                  </div>
                  <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/5a/62/70/5a62706bc5603694b1bd08acc40d3096.jpg"
                        alt=""
                      />
                      <p class="company-name">Amazon</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/72/a0/50/72a0500ff35991d147a6b48e4bffc721.jpg"
                        alt=""
                      />
                      <p class="company-name">Netflix</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/39/87/49/398749d9a5520aa1be5fe3783f941df6.jpg"
                        alt=""
                      />
                      <p class="company-name">Infosys</p>
                    </div>
                  </div>
                  <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/56/75/23/567523ef08b76719934714f88fd82dbe.jpg"
                        alt=""
                      />
                      <p class="company-name">Capgemini</p>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-6">
                <div class="deephire-card shadow">
                  <h2 class="deephire-card-heading">Domains</h2>
                  <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/fa/e8/62/fae862fff4f6100d000a1c01c4030db0.jpg"
                        alt=""
                      />
                      <p class="company-name">Full Stack Developer</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/0d/42/c5/0d42c51c82fca7b2a1360ffec4747b2a.jpg"
                        alt=""
                      />
                      <p class="company-name">Front end Developer</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/93/f9/55/93f9558141d88a304098ac5b3f1b3e95.jpg"
                        alt=""
                      />
                      <p class="company-name">Back end Developer</p>
                    </div>
                    </div>
                    <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/22/f1/66/22f166c79b88eff425400e15b943065c.jpg"
                        alt=""
                      />
                      <p class="company-name">Java Developer</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/e5/1c/a4/e51ca4cbafa87bd9bb678d8224a2b9d6.jpg"
                        alt=""
                      />
                      <p class="company-name">Python Developer</p>
                    </div>
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/c7/7b/00/c77b00580deec85682a56c8f072e3d30.jpg"
                        alt=""
                      />
                      <p class="company-name">AI/ML Developer</p>
                    </div>
                </div>
                <div class="d-flex flex-row">
                    <div class="company">
                      <img
                        class="company-logo"
                        src="https://i.pinimg.com/736x/a3/52/6f/a3526ff1910207e8f19d70f2997b264a.jpg"
                        alt=""
                      />
                      <p class="company-name">System Designer</p>
                    </div>
                </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="difficulty-selector text-center">
        <h3>Select Difficulty Level</h3>
        <div class="difficulty-options">
          <button class="difficulty-btn" data-level="Easy">Easy</button>
          <button class="difficulty-btn" data-level="Medium">Medium</button>
          <button class="difficulty-btn" data-level="Hard">Hard</button>
        </div>
        <button class="get-started-btn">Get Started</button>
      </div>
    </div>
  </body>
</html>
